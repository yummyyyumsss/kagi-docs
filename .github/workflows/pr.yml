name: Build test

on:
  pull_request:
    branches:
      - main

jobs:
  buildtest:
    runs-on: ubuntu-20.04
    steps:
    - uses: actions/checkout@v4
    - uses: docker/setup-buildx-action@v3
    - uses: docker/build-push-action@v6
      with:
        tags: "test-kagi-docs:latest"
        push: false
